{% extends 'admin/base_site.html' %}

{% block content %}
<div class="kyc-review">
    <h1>Review KYC for {{ user.username }}</h1>
    
    <div class="review-container">
        <div class="documents-section">
            <h2>Documents</h2>
            {% for doc in documents %}
            <div class="document-review">
                <h3>{{ doc.get_document_type_display }}</h3>
                <div class="document-preview">
                    {% if doc.file.url|lower|slice:"-4:" == ".pdf" %}
                        <iframe src="{{ doc.file.url }}" width="100%" height="400px"></iframe>
                    {% else %}
                        <img src="{{ doc.file.url }}" alt="{{ doc.get_document_type_display }}" style="max-width: 100%; max-height: 400px;">
                    {% endif %}
                </div>
                
                <form method="post" style="margin-top: 1rem;">
                    {% csrf_token %}
                    <input type="hidden" name="document_id" value="{{ doc.id }}">
                    
                    <div class="rejection-form">
                        <select name="rejection_reason">
                            <option value="">Select rejection reason...</option>
                            <option value="BLURRY">Blurry or unclear</option>
                            <option value="WRONG_FORMAT">Wrong file format</option>
                            <option value="EXPIRED">Document expired</option>
                            <option value="NAME_MISMATCH">Name mismatch</option>
                            <option value="ADDRESS_MISMATCH">Address mismatch</option>
                            <option value="SELFIE_MISMATCH">Selfie doesn't match ID</option>
                            <option value="OTHER">Other</option>
                        </select>
                        <textarea name="rejection_details" placeholder="Additional details..."></textarea>
                    </div>
                    
                    <div class="action-buttons">
                        <button type="submit" name="action" value="approve" class="btn-approve">✅ Approve</button>
                        <button type="submit" name="action" value="reject" class="btn-reject">❌ Reject</button>
                    </div>
                </form>
            </div>
            {% endfor %}
        </div>
    </div>
</div>

<style>
    .review-container {
        max-width: 1200px;
        margin: 0 auto;
    }
    .document-review {
        background: white;
        border: 1px solid #ddd;
        border-radius: 0.5rem;
        padding: 1.5rem;
        margin-bottom: 2rem;
    }
    .document-preview {
        margin: 1rem 0;
        text-align: center;
    }
    .rejection-form {
        margin-top: 1rem;
        padding-top: 1rem;
        border-top: 1px solid #eee;
    }
    select, textarea {
        width: 100%;
        padding: 0.5rem;
        margin-bottom: 0.5rem;
        border: 1px solid #ddd;
        border-radius: 0.25rem;
    }
    textarea {
        height: 60px;
    }
    .action-buttons {
        display: flex;
        gap: 1rem;
        margin-top: 1rem;
    }
    .btn-approve {
        background: #10b981;
        color: white;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 0.25rem;
        cursor: pointer;
    }
    .btn-reject {
        background: #ef4444;
        color: white;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 0.25rem;
        cursor: pointer;
    }
</style>
{% endblock %}
